<!doctype html>
<html lang="zh-CN">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Browser MCP Bridge</title>
		<style>
			:root {
				color-scheme: light dark;
				font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			}
			body {
				min-width: 420px;
				margin: 0;
				padding: 20px;
			}
			h1 {
				margin: 0 0 16px;
				font-size: 18px;
			}
			label {
				display: block;
				margin: 12px 0 6px;
				font-weight: 600;
			}
			input {
				box-sizing: border-box;
				width: 100%;
				padding: 8px 10px;
				border: 1px solid #999;
				border-radius: 6px;
				font: inherit;
			}
			button {
				margin-top: 16px;
				padding: 8px 12px;
				border: 0;
				border-radius: 6px;
				background: #2563eb;
				color: white;
				font: inherit;
				cursor: pointer;
			}
			pre {
				white-space: pre-wrap;
				word-break: break-word;
				margin-top: 16px;
				padding: 12px;
				border-radius: 6px;
				background: rgba(127, 127, 127, 0.15);
			}
		</style>
	</head>
	<body>
		<h1>Browser MCP Bridge</h1>
		<label for="bridgeUrl">Bridge URL</label>
		<input id="bridgeUrl" placeholder="http://127.0.0.1:17890" />
		<label for="token">Token</label>
		<input id="token" placeholder="Only needed if BROWSER_MCP_TOKEN is set" />
		<button id="save">Save</button>
		<pre id="status">Loading...</pre>
		<script src="options.js"></script>
	</body>
</html>
